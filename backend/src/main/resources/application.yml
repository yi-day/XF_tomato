spring:
  application:
    name: backend1
  datasource:
    url: jdbc:mysql://localhost:3306/tomato?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: tomato.entity

server:
  port: 8080

logging:
  level:
    tomato: info
